<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
overflow:hidden;
}

/* Glow Text */

h1{
font-size:50px;
animation: glow 2s infinite alternate;
}

@keyframes glow{
0%{text-shadow:0 0 20px yellow,10px -10px 30px orange,-20px -20px 40px red;}
100%{text-shadow:0 0 20px yellow,20px -20px 40px orange,-30px -30px 50px red;}
}

/* Stars */

.star{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
0%{opacity:0.2;transform:scale(0.8);}
100%{opacity:1;transform:scale(1.5);}
}

/* Photos */

.photo{
width:130px;
border-radius:15px;
position:absolute;
top:150px;
box-shadow:0 0 20px white;
}

.left{
left:30px;
}

.right{
right:30px;
}

/* Cake */

.cake{
width:220px;
margin:150px auto;
position:relative;
}

/* Cake layers */

.layer{
height:40px;
border-radius:10px;
margin:5px 0;
opacity:0;
animation: rise 1s forwards;
}

/* Bottom layer */

.layer1{
background:pink;
animation-delay:1s;
}

/* Middle layer */

.layer2{
background:lightblue;
animation-delay:2s;
}

/* Top layer */

.layer3{
background:orange;
animation-delay:3s;
}

@keyframes rise{
from{
transform:translateY(80px);
opacity:0;
}
to{
transform:translateY(0);
opacity:1;
}
}

/* Candle */

.candle{
width:10px;
height:40px;
background:white;
position:absolute;
top:-45px;
left:50%;
transform:translateX(-50%);
border-radius:3px;
opacity:0;
animation: showCandle 1s forwards;
animation-delay:4s;
}

/* Flame */

.flame{
width:12px;
height:12px;
background:yellow;
border-radius:50%;
position:absolute;
top:-15px;
left:-1px;
animation:flicker 0.3s infinite alternate;
}

@keyframes showCandle{
from{opacity:0;}
to{opacity:1;}
}

@keyframes flicker{
from{transform:scale(1);}
to{transform:scale(1.3);}
}

/* Heart beat */

.heart{
font-size:60px;
color:red;
margin-top:40px;
animation: heartbeat 1s infinite;
}

@keyframes heartbeat{
0%{transform:scale(1);}
25%{transform:scale(1.2);}
50%{transform:scale(1);}
75%{transform:scale(1.2);}
100%{transform:scale(1);}
}

</style>
</head>

<body onload="playSong()">

<h1>🎂 Happy Birthday Mam 🎂</h1>

<!-- Photos -->

<img src="photo1.jpeg" class="photo left"height="200"width="250">
<img src="photo2.jpeg"class="photo right"height="200"width="250">

<!-- Cake -->

<div class="cake">

<div class="layer layer1"></div>
<div class="layer layer2"></div>
<div class="layer layer3"></div>

<div class="candle">
<div class="flame"></div>
</div>

</div>

<!-- Heart -->

<div class="heart">❤️</div>

<!-- Song -->

<audio id="song">
<source src="song.mpeg" type="audio/mpeg">
</audio>

<script>

/* Play song */

function playSong(){
document.getElementById("song").play();
}

/* Create stars */

for(let i=0;i<80;i++){
let star=document.createElement("div");
star.className="star";

star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";

star.style.animationDuration=(1+Math.random()*2)+"s";

document.body.appendChild(star);
}

</script>

</body>
</html>
